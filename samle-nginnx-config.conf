# Learning Nginx configuration for this repository.
# Copy the server block you want into /etc/nginx/sites-available/react-crud-app,
# symlink it into sites-enabled, then run:
#
#   sudo nginx -t
#   sudo systemctl reload nginx

# Cache zone for /cache/products.
# This directive belongs in the http context, not inside a server block.
proxy_cache_path /var/cache/nginx/react-crud-app
    levels=1:2
    keys_zone=react_crud_cache:10m
    max_size=100m
    inactive=10m
    use_temp_path=off;

# Basic per-IP rate limit zone.
# This directive also belongs in the http context.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

upstream simple_crud_backend {
    least_conn;
    server 127.0.0.1:5000 max_fails=3 fail_timeout=10s;

    # Start another backend on port 5001, then uncomment this to learn load balancing.
    # server 127.0.0.1:5001 max_fails=3 fail_timeout=10s;
}

server {
    listen 80;
    server_name _;

    root /var/www/react-crud-app;
    index index.html;

    access_log /var/log/nginx/react-crud-access.log;
    error_log /var/log/nginx/react-crud-error.log warn;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Health endpoints for uptime checks and load balancer probes.
    location = /health {
        proxy_pass http://simple_crud_backend;
        include proxy_params;
    }

    location = /ready {
        proxy_pass http://simple_crud_backend;
        include proxy_params;
    }

    # Main CRUD API. Same-domain frontend requests to /items are proxied here.
    location = /items {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://simple_crud_backend;
        include proxy_params;
    }

    location /items/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://simple_crud_backend;
        include proxy_params;
    }

    # Versioned API path for learning path-based routing.
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://simple_crud_backend;
        include proxy_params;
    }

    # Diagnostic endpoints used by the React dashboard.
    location /debug/ {
        proxy_pass http://simple_crud_backend;
        include proxy_params;
    }

    location = /metrics {
        proxy_pass http://simple_crud_backend;
        include proxy_params;
    }

    # Endpoint intentionally used to learn proxy timeouts.
    location = /slow {
        proxy_connect_timeout 2s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
        proxy_pass http://simple_crud_backend;
        include proxy_params;
    }

    # Synthetic error and response-shaping endpoints for load testing.
    location ~ ^/(unstable|status|payload|cpu|admin) {
        proxy_pass http://simple_crud_backend;
        include proxy_params;
    }

    # Server-sent events need buffering disabled so events arrive immediately.
    location = /stream/events {
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 60s;
        proxy_set_header Connection "";
        proxy_pass http://simple_crud_backend;
        include proxy_params;
    }

    # Cacheable backend route. Compare X-Cache HIT/MISS while refreshing.
    location = /cache/products {
        proxy_cache react_crud_cache;
        proxy_cache_valid 200 30s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-Cache $upstream_cache_status always;
        proxy_pass http://simple_crud_backend;
        include proxy_params;
    }

    # Static frontend assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React SPA fallback.
    location / {
        try_files $uri /index.html;
    }
}
